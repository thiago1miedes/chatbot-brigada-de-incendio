<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot Brigada de Incêndio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <h1>Chatbot Brigada de Incêndio</h1>
      <p>Tire suas dúvidas sobre prevenção, combate a incêndio, evacuação de emergência e normas de segurança corporativa.</p>
    </header>

    <div id="chat" class="chat-messages"></div>

    <div class="chat-input-area">
      <textarea id="mensagem" placeholder="Digite sua pergunta sobre brigada de incêndio..." rows="2"></textarea>
      <div class="chat-buttons">
        <button id="btn-enviar" class="btn btn-primary">Enviar</button>
        <button id="btn-limpar" class="btn btn-secondary">Limpar conversa</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
